apiVersion: apps/v1
kind: Deployment
metadata:
  name: ptdt-physics-worker
  labels:
    app: ptdt
    component: physics-worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ptdt
      component: physics-worker
  template:
    metadata:
      labels:
        app: ptdt
        component: physics-worker
    spec:
      containers:
      - name: physics-engine
        image: registry.tristate.gov/ptdt/physics-worker:v32
        resources:
          requests:
            cpu: "4"
            memory: "16Gi"
          limits:
            cpu: "8"
            memory: "32Gi"
        volumeMounts:
        - name: solver-data
          mountPath: /data
      volumes:
      - name: solver-data
        persistentVolumeClaim:
          claimName: ptdt-solver-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ptdt-assimilation-worker
  labels:
    app: ptdt
    component: assimilation-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ptdt
      component: assimilation-worker
  template:
    metadata:
      labels:
        app: ptdt
        component: assimilation-worker
    spec:
      containers:
      - name: enkf-engine
        image: registry.tristate.gov/ptdt/assimilation-worker:v32
        resources:
          requests:
            cpu: "2"
            memory: "8Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ptdt-evidence-service
  labels:
    app: ptdt
    component: evidence-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ptdt
      component: evidence-service
  template:
    metadata:
      labels:
        app: ptdt
        component: evidence-service
    spec:
      containers:
      - name: evidence-api
        image: registry.tristate.gov/ptdt/evidence-service:v32
        env:
        - name: VAULT_ADDR
          value: "https://vault.internal:8200"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ptdt-api-gateway
  labels:
    app: ptdt
    component: api-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ptdt
      component: api-gateway
  template:
    metadata:
      labels:
        app: ptdt
        component: api-gateway
    spec:
      containers:
      - name: gateway
        image: registry.tristate.gov/ptdt/api-gateway:v32
        ports:
        - containerPort: 443
