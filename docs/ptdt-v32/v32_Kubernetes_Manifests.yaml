# PTDT v32 Kubernetes Manifests
# Defines Physics Workers, Assimilation Service, Evidence Store, and API Gateway

---
# PVC for Physics Worker Data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ptdt-solver-pvc
  labels:
    app: ptdt
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi

---
# Physics Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ptdt-physics-worker
  labels:
    app: ptdt
    component: physics-worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ptdt
      component: physics-worker
  template:
    metadata:
      labels:
        app: ptdt
        component: physics-worker
    spec:
      containers:
      - name: physics-engine
        image: registry.tristate.gov/ptdt/physics-worker:v32
        imagePullPolicy: Always
        resources:
          requests:
            cpu: "4"
            memory: "16Gi"
          limits:
            cpu: "8"
            memory: "32Gi"
        volumeMounts:
        - name: solver-data
          mountPath: /data
        livenessProbe:
          httpGet:
            path: /health/physics
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: solver-data
        persistentVolumeClaim:
          claimName: ptdt-solver-pvc

---
# Assimilation Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ptdt-assimilation-worker
  labels:
    app: ptdt
    component: assimilation-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ptdt
      component: assimilation-worker
  template:
    metadata:
      labels:
        app: ptdt
        component: assimilation-worker
    spec:
      containers:
      - name: enkf-engine
        image: registry.tristate.gov/ptdt/assimilation-worker:v32
        resources:
          requests:
            cpu: "2"
            memory: "8Gi"
          limits:
            cpu: "4"
            memory: "16Gi"
        livenessProbe:
          httpGet:
            path: /health/assimilation
            port: 8081
          initialDelaySeconds: 20
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 5

---
# Evidence Store / Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ptdt-evidence-service
  labels:
    app: ptdt
    component: evidence-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ptdt
      component: evidence-service
  template:
    metadata:
      labels:
        app: ptdt
        component: evidence-service
    spec:
      containers:
      - name: evidence-api
        image: registry.tristate.gov/ptdt/evidence-service:v32
        env:
        - name: VAULT_ADDR
          value: "https://vault.internal:8200"
        resources:
          requests:
            cpu: "1"
            memory: "2Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
        livenessProbe:
          httpGet:
            path: /health/evidence
            port: 8082
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8082
          initialDelaySeconds: 5
          periodSeconds: 5

---
# API Gateway Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ptdt-api-gateway
  labels:
    app: ptdt
    component: api-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ptdt
      component: api-gateway
  template:
    metadata:
      labels:
        app: ptdt
        component: api-gateway
    spec:
      containers:
      - name: gateway
        image: registry.tristate.gov/ptdt/api-gateway:v32
        ports:
        - containerPort: 443
        - containerPort: 80
        resources:
          requests:
            cpu: "1"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "2Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5

---
# Services for inter-component communication
apiVersion: v1
kind: Service
metadata:
  name: ptdt-evidence-svc
spec:
  selector:
    app: ptdt
    component: evidence-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8082

---
apiVersion: v1
kind: Service
metadata:
  name: ptdt-gateway-svc
spec:
  type: LoadBalancer
  selector:
    app: ptdt
    component: api-gateway
  ports:
    - protocol: TCP
      port: 443
      targetPort: 443
    - protocol: TCP
      port: 80
      targetPort: 80
