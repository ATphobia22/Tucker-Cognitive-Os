apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openmi-grpc.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openmi-grpc.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "openmi-grpc.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "openmi-grpc.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: OIDC_JWKS_URI
              value: {{ .Values.env.oidcJwksUri | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tucker-db-secrets
                  key: database-url
            - name: LOG_LEVEL
              value: {{ .Values.env.logLevel | quote }}
            - name: PYTHONPATH
              value: {{ .Values.env.pythonPath | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
