apiVersion: apps/v1
kind: Deployment
metadata:
  name: openmi-grpc-server
  namespace: ptdt-v32
  labels:
    app: openmi-grpc
spec:
  replicas: 3
  selector:
    matchLabels:
      app: openmi-grpc
  template:
    metadata:
      labels:
        app: openmi-grpc
    spec:
      containers:
      - name: openmi-grpc
        image: harbor.tucker.gov/ptdt/openmi-grpc:v32.1.0
        ports:
        - containerPort: 50051
          name: grpc
        env:
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
        readinessProbe:
          grpc:
            port: 50051
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          grpc:
            port: 50051
          initialDelaySeconds: 30
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: openmi-grpc-service
  namespace: ptdt-v32
spec:
  selector:
    app: openmi-grpc
  ports:
  - protocol: TCP
    port: 50051
    targetPort: 50051
    name: grpc
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: openmi-grpc-hpa
  namespace: ptdt-v32
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: openmi-grpc-server
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
