apiVersion: v1
kind: Service
metadata:
  name: kiali
  namespace: istio-system
spec:
  type: ClusterIP
  ports:
  - port: 20001
    targetPort: 20001
    name: http
  selector:
    app: kiali
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kiali
  namespace: istio-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kiali
  template:
    metadata:
      labels:
        app: kiali
    spec:
      containers:
      - name: kiali
        image: quay.io/kiali/kiali:v1.73
        ports:
        - containerPort: 20001
        env:
        - name: KIALI__SERVER__WEB_ROOT
          value: "/kiali"
