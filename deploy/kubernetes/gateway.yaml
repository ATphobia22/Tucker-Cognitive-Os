apiVersion: apps/v1
kind: Deployment
metadata:
  name: tucker-gateway
  namespace: tucker-sovereign
  labels:
    app: tucker-gateway
    tier: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: tucker-gateway
  template:
    metadata:
      labels:
        app: tucker-gateway
    spec:
      containers:
      - name: gateway
        image: harbor.tucker.gov/citadel/gateway:v32.1.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http-api
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: tucker-db-secrets
              key: database-url
        - name: OIDC_JWKS_URI
          value: "https://idp.tucker.gov/.well-known/jwks.json"
        resources:
          limits:
            cpu: "2"
            memory: 2Gi
          requests:
            cpu: "500m"
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: tucker-gateway-srv
  namespace: tucker-sovereign
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: tucker-gateway
